name: Demo

on:
  push:
  pull_request:

jobs:
  run-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install demo dependencies
        run: pip install -r demo/requirements.txt

      - name: Run demo
        run: python demo/vortex_demo.py
